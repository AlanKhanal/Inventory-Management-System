<!DOCTYPE html>
<html>

<head>
    <title>Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div id="navbar"></div>

    <div class="container mt-4">

        <h3 class="mb-3">Product Management</h3>

        <!-- FORM -->
        <div class="card p-3 mb-4">

            <div class="row g-2">

                <div class="col-md-4">
                    <input id="name" class="form-control" placeholder="Product Name">
                </div>

                <div class="col-md-3">
                    <input id="price" class="form-control" placeholder="Price">
                </div>

                <div class="col-md-3">
                    <input id="stock" class="form-control" placeholder="Stock">
                </div>

                <div class="col-md-2 d-grid gap-2">

                    <button class="btn btn-primary" onclick="addProduct()" id="addBtn">
                        Add
                    </button>

                    <button class="btn btn-success" onclick="updateProduct()" id="updateBtn" style="display:none;">
                        Update
                    </button>

                </div>

            </div>

        </div>

        <!-- TABLE -->
        <div class="card p-3">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="productTable"></tbody>

            </table>

        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/product.js"></script>

    <script>
        loadNavbar();
        loadProducts();
    </script>

</body>
</html>
